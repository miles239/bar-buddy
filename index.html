<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #0d0d0d; color: #e8e8e8; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  button { font-family: inherit; }
  input { font-family: inherit; }
  .header { position: sticky; top: 0; z-index: 10; background: #0d0d0d; border-bottom: 1px solid #1a1a1a; }
  .header-top { padding: 14px 16px 0; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: #e53935; letter-spacing: 3px; line-height: 1; }
  .sublogo { font-size: 10px; color: #666; letter-spacing: 2px; font-weight: 500; margin-top: 2px; }
  .fav-btn { background: #1a1a1a; border: 1px solid #333; color: #888; font-size: 20px; border-radius: 8px; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .fav-btn.active { background: #e53935; border-color: #e53935; color: #fff; }
  .search-wrap { padding: 10px 16px; position: relative; }
  .search { width: 100%; background: #141414; border: 1px solid #2a2a2a; border-radius: 10px; padding: 12px 40px 12px 16px; font-size: 15px; color: #e8e8e8; outline: none; }
  .search-clear { position: absolute; right: 26px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #666; font-size: 20px; cursor: pointer; }
  .filters { display: flex; gap: 6px; padding: 0 16px 10px; flex-wrap: wrap; }
  .mode-toggle { display: flex; gap: 5px; padding: 10px 16px 0; }
  .mode-btn { flex: 1; padding: 9px 4px; border-radius: 8px; border: 1px solid #2a2a2a; background: #141414; color: #777; font-size: 10px; font-weight: 700; letter-spacing: 0.8px; cursor: pointer; }
  .mode-btn.active { background: #e53935; border-color: #e53935; color: #fff; }
  .mode-btn.classics.active { background: #c9851a; border-color: #c9851a; color: #fff; }
  .mode-btn.discontinued.active { background: #6b6b6b; border-color: #6b6b6b; color: #fff; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; background: #1a1a1a; color: #999; letter-spacing: 0.5px; }
  .filter-btn.active { background: #e53935; color: #fff; }
  .subfilters { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .subfilters::-webkit-scrollbar { display: none; }
  .subfilter-btn { flex-shrink: 0; padding: 5px 12px; border-radius: 16px; border: 1px solid; font-size: 11px; font-weight: 600; cursor: pointer; background: #0d0d0d; }
  .results { padding: 8px 16px 60px; }

  {id:25,name:"Aperol Spritz",category:"Classics",glass:"250 ml Wine Glass",ice:"Cubed Ice",method:"Build",ingredients:["2 oz. Aperol","3 oz. Prosecco","1 oz. Soda Water"],steps:"Fill a Large Wine Glass with cubed ice. Build in all the ingredients. Top with T'Gallant Prosecco.",garnish:"Orange Slice",tags:["aperol","prosecco","spritz","classic"]},
  {id:26,name:"Old Fashioned",category:"Classics",isNew:true,glass:"Old Fashioned Glass",ice:"Cubed Ice",method:"Build and Stir",ingredients:["2 oz. Makers Mark","0.5 oz. Simple Syrup","2 dashes Australian Bitters","1 Cherry (stem removed)"],steps:"Fill a Old Fashioned glass with cubed ice. Build in all the ingredients and stir for 20-30 seconds.",garnish:"Orange twist (squeeze & roll around rim & drop into drink)",tags:["bourbon","whiskey","bitters","classic"]},

  {id:40,name:"Vanilla Thrilla",category:"Dirty Sodas",isNew:true,glass:"Schooner glass",ice:"Cubed Ice",method:"Build",ingredients:["1 oz. Vanilla Monin Syrup","Topped with Coke","1 oz. Thickened Cream Float"],steps:"Build in schooner glass filled with cubed ice. Add vanilla syrup then top with coke, leaving a 1cm gap from the top. Stir. Float thickened cream on the top. Finish with a lime wedge and a cherry on top.",garnish:"1 Maraschino Cherry, 1 Lime Wedge",tags:["non-alcoholic","vanilla","coke","cream"]},
  {id:41,name:"Everyday Vacay",category:"Dirty Sodas",glass:"Schooner glass",ice:"Cubed Ice",method:"Build",ingredients:["1 oz. Pineapple Juice","0.5 oz. Coconut Monin Syrup","1.5 oz. Mango Puree","Topped with Lift","0.5 oz. UHT Coconut Cream Float"],steps:"Build in schooner glass filled with cubed ice. Add pineapple juice, coconut syrup and mango puree. Then top with Lift, leaving a 1cm gap from the top. Float UHT coconut cream on the top. Finish with a pineapple slice and a cocktail umbrella.",garnish:"1 Pineapple Slice, 1 Cocktail Umbrella",tags:["non-alcoholic","pineapple","coconut","mango"]},
  {id:42,name:"Razmatazz",category:"Dirty Sodas",glass:"Schooner glass",ice:"Cubed Ice",method:"Build",ingredients:["1.5 oz. Bickfords Creamy Soda Cordial","2 oz. Raspberry Fanta","2 oz. Coke","1 oz. Thickened Cream Float"],steps:"Build in schooner glass filled with cubed ice. Add creamy soda cordial, raspberry fanta and coke. Stir. Float thickened cream on the top. Finish with a dusting of freeze dried raspberry powder.",garnish:"Dusting of Freeze Dried Raspberries",tags:["non-alcoholic","raspberry","creamy soda","cream"]},

  {id:49,name:"Hot Chocolate",category:"Coffee & Tea",glass:"Irish Coffee 285ml tuff",ice:"No Ice",method:"Build",ingredients:["0.5 oz. Chocolate Syrup","1 oz. Hot water","3 oz. Milk, Full Cream"],steps:"Mix the Chocolate syrup and hot water in the glass. Froth the milk to 65 degrees. Pour the frothed milk into the cup. Ensure there is 1-2 cm cap of foam on the top. Dust with Chocolate Powder. Serve on a saucer with 2 marshmallows.",garnish:"Dusting of chocolate powder, 2 marshmallows, Saucer and a parfait spoon",tags:["non-alcoholic","chocolate","hot","coffee"]},
  {id:50,name:"Iced Coffee",category:"Coffee & Tea",glass:"Schooner",ice:"Cubed Ice",method:"Build",ingredients:["3 oz. Full Cream Milk","1 scoop Ice Cream","1 scoop cubed ice","1 shot of Fresh Coffee"],steps:"Add cubed ice to a schooner glass. Add the milk and ice cream to the glass. Pour the shot of coffee over the ice cream. Top with whipped cream.",garnish:"Whipped Cream, Dusting of Chocolate Powder",tags:["non-alcoholic","coffee","ice cream","cold"]},
  {id:51,name:"Pots of Tea",category:"Coffee & Tea",glass:"Cappuccino Cup, 2 x Saucers, Tea Pot, Milk Jug, and Tea Spoon",ice:"No Ice",method:"Build",ingredients:["200ml Boiling Water","1 tea bag of choice","Milk of choice served on the side"],steps:"1 x Tea bag of guests choice. Fill Teapot with boiling water. Serve on a wooden board.",garnish:"1 Sugar Stick and Milk if required",tags:["non-alcoholic","tea","hot"]},
  {id:52,name:"Chai - Spiced",category:"Coffee & Tea",glass:"Latte Glass, Saucer and teaspoon",ice:"No Ice",method:"Build",ingredients:["2-3 tsp Chai Powder","3oz. Frothed Milk, Full Cream"],steps:"Stir powder & frothed milk (half the amount). Top with additional milk.",garnish:"Dusting of Cinnamon Powder",tags:["non-alcoholic","chai","hot","spiced"]},
  {id:80,name:"Espresso (Single / Double)",category:"Coffee & Tea",glass:"Espresso Cup or Shot Glass",ice:"No Ice",method:"Espresso Machine",isGuide:true,ingredients:["Single: 1 shot (30ml) freshly extracted espresso","Double: 2 shots (60ml) freshly extracted espresso"],steps:"Purge the group head. Dose, distribute and tamp the coffee evenly. Lock in the portafilter and start extraction immediately. Aim for 25-30 seconds extraction time. Should produce a rich, golden-brown crema on top. A single shot yields ~30ml, a double ~60ml.",garnish:"Served on a saucer with a teaspoon",tags:["non-alcoholic","coffee","hot","espresso","guide"]},
  {id:81,name:"Long Black",category:"Coffee & Tea",glass:"Ceramic Cup (200-220ml)",ice:"No Ice",method:"Build",isGuide:true,ingredients:["2/3 hot water (not boiling - around 92°C)","Reg: 1 single shot espresso poured ON TOP","Lrg: 1 long shot / XL: 1 double shot"],steps:"Fill cup 2/3 with hot water. Extract espresso and pour it gently over the hot water. Pouring espresso on top (not water on espresso) preserves the crema layer. This is the key difference from an Americano.\n\nSIZING: Regular = single shot. Large = long shot. XL = double shot.",garnish:"Served on a saucer with a teaspoon",tags:["non-alcoholic","coffee","hot","guide"]},
  {id:82,name:"Americano",category:"Coffee & Tea",glass:"Ceramic Cup (200-220ml)",ice:"No Ice",method:"Build",isGuide:true,ingredients:["Reg: 1 single shot espresso extracted first","Lrg: 1 long shot / XL: 1 double shot","2/3 hot water poured ON TOP"],steps:"Extract espresso into the cup first. Then add hot water on top to fill. The difference from a Long Black is the order: Americano = espresso first, water on top (breaks the crema). Long Black = water first, espresso on top (preserves crema). Result is similar strength but Long Black has a richer mouthfeel.\n\nSIZING: Regular = single shot. Large = long shot. XL = double shot.",garnish:"Served on a saucer with a teaspoon",tags:["non-alcoholic","coffee","hot","guide"]},
  {id:83,name:"Flat White",category:"Coffee & Tea",glass:"Ceramic Cup (180-200ml)",ice:"No Ice",method:"Build",isGuide:true,ingredients:["Reg: 1 single shot espresso","Lrg: 1 long shot / XL: 1 double shot","Steamed milk with thin microfoam (5-8mm)"],steps:"Extract espresso. Steam full cream milk to 60-65°C with a thin, velvety microfoam (about 5-8mm of foam). Tap the jug on the bench to pop any large bubbles, then swirl to integrate. Pour the milk through the crema in a steady stream. The key is THIN microfoam - less foam than a latte, much less than a cappuccino.\n\nSIZING: Regular = single shot. Large = long shot. XL = double shot.",garnish:"",tags:["non-alcoholic","coffee","hot","guide"]},
  {id:84,name:"Latte",category:"Coffee & Tea",glass:"Latte Glass (220-280ml)",ice:"No Ice",method:"Build",isGuide:true,ingredients:["Reg: 1 single shot espresso","Lrg: 1 long shot / XL: 1 double shot","Steamed milk with light microfoam (10-12mm)"],steps:"Extract espresso. Steam full cream milk to 60-65°C with a light, smooth microfoam (about 10-12mm of foam). More foam than a flat white, less than a cappuccino. Pour steadily into the espresso. The larger glass and extra milk makes this milder than a flat white.\n\nSIZING: Regular = single shot. Large = long shot. XL = double shot.",garnish:"Served on a saucer with a teaspoon",tags:["non-alcoholic","coffee","hot","guide"]},
  {id:85,name:"Cappuccino",category:"Coffee & Tea",glass:"Ceramic Cup (180-200ml)",ice:"No Ice",method:"Build",isGuide:true,ingredients:["Reg: 1 single shot espresso","Lrg: 1 long shot / XL: 1 double shot","Steamed milk with thick foam (15-20mm)"],steps:"Extract espresso. Steam full cream milk to 60-65°C with a thick, airy foam layer (15-20mm). The classic rule of thirds: 1/3 espresso, 1/3 steamed milk, 1/3 foam. Dust with chocolate powder.\n\nSIZING: Regular = single shot. Large = long shot. XL = double shot.",garnish:"Dusting of chocolate powder",tags:["non-alcoholic","coffee","hot","guide"]},
  {id:86,name:"Macchiato",category:"Coffee & Tea",glass:"Espresso Cup or Small Glass",ice:"No Ice",method:"Build",isGuide:true,ingredients:["Reg: 1 single shot espresso","Lrg: 1 long shot / XL: 1 double shot","1 small dollop of milk foam"],steps:"Extract espresso into a small cup. Add just a small dollop of milk foam on top. 'Macchiato' means 'stained' in Italian - the espresso is just stained with a touch of milk. This is strong and intense, essentially an espresso with a tiny cap of foam.\n\nSIZING: Regular = single shot. Large = long shot. XL = double shot.",garnish:"",tags:["non-alcoholic","coffee","hot","espresso","guide"]},
  {id:87,name:"Mocha",category:"Coffee & Tea",glass:"Latte Glass (220-280ml)",ice:"No Ice",method:"Build",isGuide:true,ingredients:["Reg: 1 single shot espresso","Lrg: 1 long shot / XL: 1 double shot","0.5 oz. Chocolate Syrup","Steamed milk with light microfoam"],steps:"Add chocolate syrup to the glass. Extract espresso and stir into the chocolate to combine. Steam full cream milk to 60-65°C with light microfoam (like a latte). Pour steamed milk over the espresso-chocolate mix. Top with whipped cream if requested.\n\nSIZING: Regular = single shot. Large = long shot. XL = double shot.",garnish:"Whipped cream (optional), dusting of chocolate powder",tags:["non-alcoholic","coffee","hot","chocolate","guide"]},
  {id:88,name:"Latte Art Tips",category:"Coffee & Tea",glass:"",ice:"",method:"Guide",isGuide:true,ingredients:["Fresh full cream milk (cold from the fridge)","Clean stainless steel milk jug","Properly extracted espresso with good crema"],steps:"THE MILK:\n• Always start with cold milk straight from the fridge\n• Use the right jug size - fill to just below the spout base\n• Purge the steam wand before and after every use\n\nSTEAMING TECHNIQUE:\n• Submerge the tip just below the surface at a slight angle\n• Introduce air in the first 3-5 seconds (you'll hear a gentle hissing/chirping sound)\n• Then submerge deeper and create a whirlpool to integrate the foam\n• Stop at 60-65°C (the jug should be hot but you can still touch it for 2 seconds)\n• Tap the jug firmly on the bench to pop large bubbles, then swirl continuously\n\nPOURING:\n• Start pouring from height (10-15cm above cup) to push through the crema\n• As the cup fills, bring the jug closer to the surface\n• For a heart: pour steadily in the centre, then flick through at the end\n• For a rosetta: wiggle the jug side to side as you pour, then flick through\n• Speed and confidence matter more than perfection - practice every single coffee\n\nCOMMON MISTAKES:\n• Milk too hot (burnt, won't pour properly)\n• Too much air (big bubbles, stiff foam)\n• Pouring from too high the whole time (no art forms)\n• Waiting too long after steaming (foam separates from milk)",garnish:"",tags:["non-alcoholic","coffee","guide","latte art"]},
  {id:53,name:"Fancy Floss",category:"Kids Drinks",glass:"Kids Cup",ice:"Crushed Ice",method:"Build",ingredients:["1.5 oz. Pineapple Juice","1.5 oz. Cranberry Juice","Small handful of Fairy Floss"],steps:"Fill the kids cup with crushed ice. Add the pineapple and cranberry juice. Top with more crushed ice. Place the Fairy Floss to the top of the ice. Make sure your hands are dry to avoid the fairy floss dissolving.",garnish:"Fairy Floss",tags:["non-alcoholic","kids","pineapple","cranberry"]},

  {id:58,name:"Soft Drinks",category:"Soft Drinks",glass:"Schooner / Pint / Jug",ice:"Cubed Ice",method:"Build",ingredients:["Coca Cola","No Sugar Coke","Sprite","Raspberry Fanta","Ginger Beer","Lift","Soda Water"],steps:"Add 2/3 ice to the glass, or jug. Glass: Fill with soft drinks 1 cm from the top. Jug: Full with soft drinks to the measure line on the neck of the jug.",garnish:"",tags:["non-alcoholic","soft drink"]},
  {id:59,name:"Lemon Lime and Bitters",category:"Soft Drinks",glass:"Schooner / Pint / Jug",ice:"Cubed Ice",method:"Build",ingredients:["Cascade Lime Cordial (Glass - 0.75 oz. / Pint - 1 oz. / Jug - 3 oz.)","Sprite","Bitters","Lime Wedge"],steps:"Add 2/3 ice to the glass, or jug. Add Lime cordial. Top with Sprite. Finish with Bitters on top. Schooner/Pint - 5 dashes (leave drink layered). Jug - 10 dashes (then stir). Garnish with 1 Lime Wedge.",garnish:"1 Lime Wedge",tags:["non-alcoholic","lime","bitters","soft drink"]},
  {id:60,name:"Fresh Sour Rocks",category:"Prep",glass:"Makes 1.5 Litres",ice:"",method:"Prep",ingredients:["1 Cup Lemon Juice","1 Cup Lime Juice","2 Cups Simple Syrup","2 Cups Water"],steps:"Measure out all ingredients into a large measuring jug. Whisk thoroughly to combine - minimum 1 minute. Add to store and pour. Label accordingly and refrigerate.",garnish:"Colour Code: Green and Black",tags:["prep","sour","batch"]},
  {id:61,name:"Simple Syrup",category:"Prep",glass:"Makes 1.8 Litres",ice:"",method:"Prep",ingredients:["1 Litre White Sugar","1 Litre Freshly Boiled Water"],steps:"Boil the kettle. Measure out 1 litre of white sugar into a large measuring Jug. Pour over 1 litre of freshly boiled water into the measuring jug. Take care when using boiling water. Stir gently to combine. Let cool to room temperature. Pour into store and pours. Label and refrigerate.",garnish:"Colour Code: White",tags:["prep","syrup","batch"]},
  {id:62,name:"Iced Black Tea",category:"Prep",glass:"Makes 2 Litres",ice:"",method:"Prep",ingredients:["8 English Breakfast Tea Bags","1 Litre Freshly Boiled Water","1 Litre of Cold Water"],steps:"Boil the kettle. Pour 1 litre of freshly boiled water into the large measuring jug. Take care when using boiling water. Add in the 8 tea bags. Let steep for 5 minutes. Remove tea bags. Add 1 Litre of cold water. Pour into store and pours. Label and refrigerate.",garnish:"Colour Code: Black, White, Black",tags:["prep","tea","batch"]},
  {id:63,name:"Jalapeno Infused Tequila",category:"Infusion",glass:"Makes 600ml",ice:"",method:"Infusion",ingredients:["3 Green Jalapenos - Sliced","600ml Espolon Blanco Tequila"],steps:"Slice Jalapenos - Take care with chillies and use gloves. Place into the tequila - use an empty, cleaned tequila bottle with label removed. Let sit for 2 days in the fridge. Create a classic margarita using the Jalapeno Infused Tequila. Gather the team to taste test the product. Should be noticable spicy but not uncomfortable. If too spicy, dilute with more PLAIN house tequila. If not hot enough, add another Jalapeno and let sit for more time. Repeat process until correct. Store in the fridge.",garnish:"Colour Code: Black and Blue",tags:["infusion","tequila","jalapeno","spicy"]},
  {id:64,name:"Nerd Alert Batch",category:"Infusion",glass:"Makes 1.25L",ice:"",method:"Infusion",ingredients:["1 Large packet of Nerds","200ml House Vodka","200ml House White Rum","200ml House Gin","200ml Triple Sec","400ml Bickford's Pink Lemonade Cordial"],steps:"Add all ingredients together, mix and set aside for a minimum 2 days. Shake the bottle regularly to avoid the Nerds sticking to the bottom of the bottle. Strain batch after 2 days.",garnish:"Colour Code: Blue and Green",tags:["infusion","vodka","rum","gin","nerds","batch"]},
  {id:65,name:"Marshmallow-Infused Vodka",category:"Infusion",glass:"Makes 1 Litre - Store at Room Temperature",ice:"",method:"Infusion",ingredients:["700ml Smirnoff Red Vodka","1 Bag of Marshmallows"],steps:"Add all ingredients together, mix and set aside for a minimum 2 days. Split between 2 x 1 litres store 'n' pours. Shake the bottle regularly to avoid the Marshmallows floating to the top of the bottle. Strain batch after 2 days.",garnish:"Colour Code: Red, White, Green",tags:["infusion","vodka","marshmallow","batch"]},

  {id:68,name:"LIIT Base Batch",category:"Batch Recipes",glass:"Makes 5L",ice:"",method:"Batch",ingredients:["1250ml House Vodka","1250ml House White Rum","1250ml House Gin","1250ml Triple Sec"],steps:"LIIT BASE: 2 oz. LIIT Base Batch + 2 oz. Fresh Sour Rocks. Shake and Dirty Pour.\n\nThe OG LIIT: 4 oz. LIIT BASE, topped with 1.25 oz. Coke. Garnish: 1 Lemon Wedge.\nThe Ultimate OG LIIT: 4 oz. LIIT BASE + 0.5 oz. Smirnoff Red Vodka, topped with 1.5 oz. Coke. Garnish: 2 Lemon Wedges.\nTropic Thunder: 4 oz. LIIT BASE + 0.5 oz. Mango Puree + 0.5 oz. Raspberry Puree, topped with Sprite. Garnish: Dusting of Freeze Dried Raspberries.\nLip Smackin' Strawberry: 4 oz. LIIT BASE + 1 oz. Strawberry Puree + 1 oz. Fresh Sour Rocks. Garnish: Large Mint Sprig, 2 Strawberry Cloud Lollies.",garnish:"Colour Code: Blue and Red",tags:["batch","vodka","rum","gin","triple sec"]},
  {id:69,name:"Margarita Base Batch",category:"Batch Recipes",glass:"Makes 5L",ice:"",method:"Batch",ingredients:["3750ml House Tequila","1250ml Triple Sec"],steps:"Classic Marg (Base): 2 oz. Margarita Batch + 2 oz. Fresh Sour Rocks. Shake and Dirty Pour. Garnish: Full Salt Rim and Lime Wedge.\nPassionfruit Marg: 4 oz. Marg BASE + 1 oz. Passionfruit Pulp. Garnish: Full Salt Rim, Lime Wedge.\nWatermelon Marg: 4 oz. Marg BASE + 1 oz. Watermelon Puree. Garnish: Full Tajin Rim.\nPeach Marg: 4 oz. Marg BASE + 1 oz. Peach Puree. Garnish: Full Sugar Rim, Skewer with 3 Peach Heart Lollies.",garnish:"Colour Code: Green and Yellow",tags:["batch","tequila","triple sec","margarita"]},

  {id:75,name:"Frozen Strawberry Daiquiri (Machine)",category:"Slushie Machine",glass:"Makes 5900ml - 14 BRIX",ice:"",method:"Slushie Machine",ingredients:["900 ml Bundaberg Silver Rum","1500 ml Finest Call Strawberry Puree","500 ml Fresh Sour Rocks","3000 ml Water"],steps:"Ensure machine is off before adding ingredients. Measure out all ingredients. Pour into the plastic bowl attached to the machine. Turn on the power switch. Turn on Spirals switch to begin spinning the mixers. Turn on the Freeze switch. Let freeze for 20-30 mins. Review thickness. Turn the knob on the back either: Clockwise for thinner, Anti-clockwise for thicker. MAKE SURE TO TURN THE SLUSHY MACHINE TO CHILL FROM FROZEN OVERNIGHT.",garnish:"",tags:["slushie","machine","rum","strawberry"]},

function getInitialTheme() {
  try {
    const saved = localStorage.getItem("barbuddy-theme");
    if (saved === "light" || saved === "dark") return saved;
  } catch(e) {}
  return window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
}

function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  const themeMeta = document.querySelector('meta[name="theme-color"]');
  if (themeMeta) themeMeta.setAttribute("content", theme === "light" ? "#f2efe9" : "#08090b");
}

const initialTheme = getInitialTheme();
applyTheme(initialTheme);

let state = {
  theme: initialTheme,
  mode: "tgi",
  search: "",
  activeFilter: null,
  activeCategory: null,
  selectedRecipe: null,
  imageViewer: false,
  favorites: new Set(),
  showFavoritesOnly: false,
  scale: 1,
  batchLitres: null,
  checklist: null,
  checklistState: {date: "", checks: {}}
};

function getHistoryView() {
  if (state.imageViewer && state.selectedRecipe) return "image";
  if (state.checklist) return "checklist";
  if (state.selectedRecipe) return "detail";
  return "home";
}

function makeHistoryState() {
  return {
    barBuddy: true,
    view: getHistoryView(),
    mode: state.mode,
    recipeId: state.selectedRecipe ? state.selectedRecipe.id : null,
    checklist: state.checklist || null
  };
}

function writeHistory(method = "push") {
  try {
    const fn = method === "replace" ? history.replaceState : history.pushState;
    fn.call(history, makeHistoryState(), document.title, location.href);
  } catch(e) {}
}

function findRecipeById(id) {
  return [...RECIPES, ...CLASSICS, ...DISCONTINUED].find(r => r.id === id) || null;
}

function restoreInitialHistory() {
  const saved = history.state;
  if (!saved || !saved.barBuddy) {
    writeHistory("replace");
    return;
  }
  state.mode = saved.mode || "tgi";
  state.selectedRecipe = saved.recipeId ? findRecipeById(saved.recipeId) : null;
  state.checklist = saved.view === "checklist" ? (saved.checklist || "opening") : null;
  state.imageViewer = saved.view === "image" && !!state.selectedRecipe;
}

function loadChecklistState() {
  try {
    const s = localStorage.getItem("barbuddy-checklist");
    if (s) state.checklistState = JSON.parse(s);
  } catch(e) {}
  // Auto-reset daily checklists but keep stock flags
  const today = new Date().toISOString().split("T")[0];
  if (state.checklistState.date !== today) {
    const stockFlags = {};
    Object.keys(state.checklistState.checks).forEach(k => {
      if (k.startsWith("stock:")) stockFlags[k] = state.checklistState.checks[k];
    });
    state.checklistState = {date: today, checks: stockFlags};
    saveChecklistState();
  }
}

function saveChecklistState() {
  try { localStorage.setItem("barbuddy-checklist", JSON.stringify(state.checklistState)); } catch(e) {}
}

function loadFavs() {
  try {
    const f = localStorage.getItem("barbuddy-favorites");
    if (f) state.favorites = new Set(JSON.parse(f));
  } catch(e) {}
}

function saveFavs() {
  try { localStorage.setItem("barbuddy-favorites", JSON.stringify([...state.favorites])); } catch(e) {}
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function escapeAttr(s) {
  return String(s).replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, "&quot;");
}

let sceneTransitioning = false;
function runSceneTransition(label, subtitle, direction, changeScene) {
  const reducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (sceneTransitioning || reducedMotion || !document.body || !document.createElement) {
    changeScene();
    render();
    window.scrollTo(0, 0);
    return;
  }
  sceneTransitioning = true;
  const app = document.getElementById("app");
  const overlay = document.createElement("div");
  overlay.className = `scene-transition ${direction === "back" ? "scene-transition-back" : ""}`;
  overlay.innerHTML = `<div class="shake-backdrop"></div><div class="shake-spray" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div><div class="shake-loader"><div class="shaker-shadow"></div><div class="cocktail-shaker"><div class="shaker-cap"></div><div class="shaker-neck"></div><div class="shaker-cup"><i></i><span></span><b></b></div></div><div class="shake-ring"></div></div><div class="shake-copy"><small></small><strong></strong><span>SHAKE · STRAIN · SERVE</span></div>`;
  overlay.querySelector(".shake-copy small").textContent = subtitle;
  overlay.querySelector(".shake-copy strong").textContent = label;
  document.body.appendChild(overlay);
  if (app) app.classList.add(direction === "back" ? "scene-leaving-back" : "scene-leaving");
  requestAnimationFrame(() => overlay.classList.add("active"));
  setTimeout(() => {
    changeScene();
    render();
    window.scrollTo(0, 0);
    if (app) {
      app.classList.remove("scene-leaving", "scene-leaving-back");
      app.classList.add(direction === "back" ? "scene-arriving-back" : "scene-arriving");
    }
    overlay.classList.add("arrive");
  }, 285);
  setTimeout(() => {
    if (app) app.classList.remove("scene-arriving", "scene-arriving-back");
    overlay.remove();
    sceneTransitioning = false;
  }, 690);
}

function splitIngredient(text) {
  const value = String(text || "");
  const topped = value.match(/^Topped with\s+(.+)$/i);
  if (topped) return {amount: "TOP", name: topped[1]};
  const match = value.match(/^((?:\d+(?:\.\d+)?(?:\s*\/\s*\d+)?|[¼½¾⅓⅔])(?:\s*(?:oz\.?|ml|L|litres?|cups?|tsp|tbsp|dashes?|dash|pinch|bar spoons?|scoops?|grams?|g|leaves|wedges?|slices?|whole))?)(?:\s+)(.+)$/i);
  return match ? {amount: match[1], name: match[2]} : {amount: "", name: value};
}

function renderMethodSteps(text) {
  let steps = String(text || "").split(/\n+/).map(s => s.trim()).filter(Boolean);
  if (steps.length === 1) {
    const sentences = steps[0].split(/(?<=[.!?])\s+(?=[A-Z0-9])/).map(s => s.trim()).filter(Boolean);
    if (sentences.length > 1) steps = sentences;
  }
  steps = steps.map(s => s.replace(/^\d+[.)]\s*/, ""));
  return `<div class="method-steps">${steps.map((step, i) => `<div class="method-step"><span class="method-number">${i + 1}</span><p>${escapeHtml(step)}</p></div>`).join("")}</div>`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getBaseSpirit(recipe) {
  const SPIRITS = [
    ["espolon","Tequila"],["1800","Tequila"],["tequila","Tequila"],
    ["bundaberg","Rum"],["captain morgan","Spiced Rum"],["malibu","Coconut Rum"],
    ["bourbon","Bourbon"],["makers mark","Bourbon"],["woodford","Bourbon"],
    ["fireball","Fireball Whiskey"],["scotch","Scotch"],["rye whiskey","Rye Whiskey"],
    ["whiskey","Whiskey"],["whisky","Whisky"],["cognac","Cognac"],
    ["cachaça","Cachaça"],["cachaca","Cachaça"],["pisco","Pisco"],
    ["smirnoff","Vodka"],["vodka","Vodka"],
    ["gin","Gin"],["rum","Rum"],
    ["campari","Campari"],["aperol","Aperol"],["pimm","Pimm's"],
    ["amaretto","Amaretto"],["chambord","Chambord"],["midori","Midori"],
    ["chartreuse","Chartreuse"],["mr black","Coffee Liqueur"]
  ];
  for (const ing of recipe.ingredients) {
    const lower = ing.toLowerCase();
    for (const [key, name] of SPIRITS) {
      if (lower.includes(key)) return name;
    }
  }
  return null;
}

function cleanIng(ing) {
  return ing.replace(/^[\d./\s]+(oz\.?|ml|cups?|tsp|tbsp|dashes?|dash|pinch|bar spoons?|scoops?|litres?|grams?|g)?\s*\.?\s*/i, "")
    .replace(/^topped with\s+/i, "")
    .replace(/\([^)]*\)/g, "")
    .replace(/,.*$/, "")
    .trim();
}

function makeQuestion(recipe, pool, type) {
  if (type === "baseSpirit") {
    const correct = getBaseSpirit(recipe);
    if (!correct) return null;
    const all = ["Vodka","Rum","Gin","Tequila","Bourbon","Whiskey","Cognac","Scotch","Campari","Aperol","Cachaça","Amaretto","Chambord","Midori","Spiced Rum","Coconut Rum"];
    const distractors = shuffle(all.filter(s => s !== correct)).slice(0, 3);
    return {
      question: "What's the base spirit in a " + recipe.name + "?",
      answer: correct,
      options: shuffle([correct, ...distractors])
    };
  }
  if (type === "fromIngredients") {
    const ings = recipe.ingredients.slice(0, 4).map(cleanIng).filter(i => i.length > 0 && i.length < 50);
    if (ings.length < 2) return null;
    const distractors = shuffle(pool.filter(r => r.name !== recipe.name)).slice(0, 3).map(r => r.name);
    return {
      question: "Which drink contains these?",
      questionList: ings,
      answer: recipe.name,
      options: shuffle([recipe.name, ...distractors])
    };
  }
  if (type === "method") {
    const correct = recipe.method;
    if (!correct) return null;
    const all = [...new Set(pool.map(r => r.method).filter(m => m && m !== correct))];
    if (all.length < 3) return null;
    const distractors = shuffle(all).slice(0, 3);
    return {
      question: "What's the method for a " + recipe.name + "?",
      answer: correct,
      options: shuffle([correct, ...distractors])
    };
  }
  if (type === "glass") {
    if (!recipe.glass) return null;
    const correct = recipe.glass.split(",")[0].trim();
    const all = [...new Set(pool.map(r => r.glass).filter(g => g).map(g => g.split(",")[0].trim()))].filter(g => g !== correct);
    if (all.length < 3) return null;
    const distractors = shuffle(all).slice(0, 3);
    return {
      question: "Which glass is used for a " + recipe.name + "?",
      answer: correct,
      options: shuffle([correct, ...distractors])
    };
  }
  return null;
}

function generateQuiz(source) {
  let pool;
  if (source === "tgi") pool = RECIPES;
  else if (source === "classics") pool = CLASSICS;
  else pool = [...RECIPES, ...CLASSICS];
  const SKIP = ["Prep","Infusion","Batch Recipes","Slushie Machine","Soft Drinks","Coffee & Tea","Discontinued","Shots"];
  pool = pool.filter(r => !SKIP.includes(r.category) && r.ingredients.length >= 2);
  const selected = shuffle(pool).slice(0, 10);
  const types = ["baseSpirit","fromIngredients","method","glass"];
  const questions = [];
  for (const r of selected) {
    const tried = [];
    let q = null;
    while (tried.length < types.length && !q) {
      const remaining = types.filter(t => !tried.includes(t));
      const t = remaining[Math.floor(Math.random() * remaining.length)];
      tried.push(t);
      q = makeQuestion(r, pool, t);
    }
    if (q) questions.push(q);
  }
  return questions;
}

function getChecklistItems(type) {
  if (type === "weekly") {

    return CHECKLISTS.weekly.items.filter(i => i.day === today).map(i => i.task);
  }
  const cl = CHECKLISTS[type];
  return cl.sections.flatMap(s => s.items);
}

function renderChecklist() {
  const type = state.checklist;

  const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const today = new Date();

  const dateStr = today.toLocaleDateString("en-AU", {weekday: "long", day: "numeric", month: "long", year: "numeric"});

  let totalItems = 0, doneItems = 0;
  if (type === "stock") {
    totalItems = CHECKLISTS.stock.items.length;
    CHECKLISTS.stock.items.forEach(item => {
      if (checks[`stock:${item.product}`]) doneItems++;
    });
  } else if (type === "weekly") {
    const items = getChecklistItems("weekly");
    totalItems = items.length;
    items.forEach(task => {
      if (checks[`weekly:${task}`]) doneItems++;
    });
  } else {
    cl.sections.forEach(s => {
      s.items.forEach(item => {
        totalItems++;
        if (checks[`${type}:${item}`]) doneItems++;
      });
    });
  }
  const pct = totalItems > 0 ? (doneItems / totalItems) * 100 : 0;

  let html = `<div class="checklist-overlay">${ambientDecor()}
    <div class="checklist-header">
      <button class="checklist-close" aria-label="Close checklists" onclick="closeChecklist()">${uiIcon('close')}</button>

      <div class="checklist-progress-label">${type === 'stock' ? doneItems + ' low' : doneItems + '/' + totalItems}</div>
    </div>
    <div class="checklist-body">
      <div class="checklist-overview"><div class="overview-sheen" aria-hidden="true"></div>
        <div class="progress-ring" style="--progress:${pct * 3.6}deg"><div><strong>${type === 'stock' ? doneItems : Math.round(pct) + '%'}</strong><small>${type === 'stock' ? 'LOW' : 'DONE'}</small></div></div>
        <div class="overview-copy"><small>SHIFT CONTROL</small><h1>${type === 'stock' ? 'Stock watch' : type.charAt(0).toUpperCase() + type.slice(1) + ' run'}</h1><p>${escapeHtml(cl.subtitle)}${type === "weekly" ? " · " + todayName : ""}</p></div>
      </div>
      <div class="checklist-tabs">
        <button class="cl-tab ${type === 'opening' ? 'active' : ''}" onclick="setChecklist('opening')">OPENING</button>
        <button class="cl-tab ${type === 'closing' ? 'active' : ''}" onclick="setChecklist('closing')">CLOSING</button>
        <button class="cl-tab ${type === 'weekly' ? 'active' : ''}" onclick="setChecklist('weekly')">WEEKLY</button>
        <button class="cl-tab ${type === 'stock' ? 'active' : ''}" onclick="setChecklist('stock')">STOCK</button>
      </div>
      <div class="cl-subtitle">${type === 'stock' ? 'Tap an item to flag it for ordering' : 'Tap each task as it is completed'}</div>`;

  if (type === "weekly") {
    const items = getChecklistItems("weekly");
    if (items.length === 0) {
      html += `<div class="cl-empty"><div class="cl-empty-icon">${uiIcon('spark')}</div><div style="font-size:15px;font-weight:500">No weekly tasks today</div><div style="font-size:12px;margin-top:6px">Enjoy the day off from deep cleaning!</div></div>`;
    } else {
      items.forEach(task => {
        const key = `weekly:${task}`;
        const done = checks[key] || false;
        html += `<div class="cl-item ${done ? 'done' : ''}" onclick="toggleCheck('${escapeAttr(key)}')">
          <div class="cl-checkbox"></div>
          <div class="cl-text">${escapeHtml(task)}</div>
        </div>`;
      });
    }
  } else if (type === "stock") {
    const stockItems = CHECKLISTS.stock.items;
    const flagged = stockItems.filter(i => checks[`stock:${i.product}`]);

    if (flagged.length > 0) {
      const grouped = {};
      flagged.forEach(i => {
        if (!grouped[i.supplier]) grouped[i.supplier] = [];
        grouped[i.supplier].push(i.product);
      });
      html += `<div class="stock-summary"><div class="stock-summary-title">NEEDS ORDERING (${flagged.length})</div>`;
      Object.entries(grouped).sort((a,b) => a[0].localeCompare(b[0])).forEach(([sup, items]) => {
        html += `<div class="stock-summary-group"><span class="stock-summary-supplier">${escapeHtml(sup)}:</span> <span class="stock-summary-items">${items.map(escapeHtml).join(', ')}</span></div>`;
      });
      html += `</div>`;
    }

    const bySupplier = {};
    stockItems.forEach(i => {
      if (!bySupplier[i.supplier]) bySupplier[i.supplier] = [];
      bySupplier[i.supplier].push(i);
    });
    Object.entries(bySupplier).sort((a,b) => a[0].localeCompare(b[0])).forEach(([sup, items]) => {
      html += `<div class="cl-section-title">${escapeHtml(sup)}</div>`;
      items.forEach(item => {
        const key = `stock:${item.product}`;
        const isFlagged = checks[key] || false;
        html += `<div class="cl-item ${isFlagged ? 'flagged' : ''}" onclick="toggleCheck('${escapeAttr(key)}')">
          <div class="cl-checkbox"></div>
          <div class="cl-text">${escapeHtml(item.product)}</div>
        </div>`;
      });
    });
  } else {
    cl.sections.forEach(s => {
      html += `<div class="cl-section-title">${escapeHtml(s.title)}</div>`;
      s.items.forEach(item => {
        const key = `${type}:${item}`;
        const done = checks[key] || false;
        html += `<div class="cl-item ${done ? 'done' : ''}" onclick="toggleCheck('${escapeAttr(key)}')">
          <div class="cl-checkbox"></div>
          <div class="cl-text">${escapeHtml(item)}</div>
        </div>`;
      });
    });

  html += `<button class="cl-reset-btn" onclick="resetChecklist()">RESET ALL ${type.toUpperCase()} ${type === 'stock' ? 'FLAGS' : 'TASKS'}</button>
      <div class="cl-date">${type === 'stock' ? 'FLAGS PERSIST UNTIL MANUALLY CLEARED' : dateStr.toUpperCase() + ' · RESETS AT MIDNIGHT'}</div>
    </div>
  </div>`;
  return html;
}

function formatScaled(num) {
  // Round to 2 decimals, strip trailing zeros
  if (num >= 10) return Math.round(num).toString();
  const rounded = Math.round(num * 100) / 100;
  // Common fractions for nicer display
  const frac = rounded - Math.floor(rounded);
  if (Math.abs(frac - 0.25) < 0.02) return Math.floor(rounded) + "¼";
  if (Math.abs(frac - 0.5) < 0.02) return (Math.floor(rounded) === 0 ? "" : Math.floor(rounded)) + "½";
  if (Math.abs(frac - 0.75) < 0.02) return Math.floor(rounded) + "¾";
  if (Math.abs(frac - 0.33) < 0.04) return Math.floor(rounded) + "⅓";
  if (Math.abs(frac - 0.67) < 0.04) return Math.floor(rounded) + "⅔";
  return rounded.toString().replace(/\.?0+$/, "");
}

function scaleIngredient(ing, mult) {
  if (mult === 1) return ing;
  // Match patterns like "2 oz.", "1.5 oz.", "0.5 oz.", "3 ml", "2 Cups", "1/2 Cup", "3 dashes", "5 leaves", etc.
  // Also bare numbers at start: "7 Mint leaves", "2 Lime wedges"
  return ing.replace(/(^|\s)(\d+(?:\.\d+)?(?:\s*\/\s*\d+)?)(\s*)/g, function(match, pre, num, post, offset) {
    // Only scale the FIRST number in the string
    if (offset > 8 && pre !== "") return match;
    let value;
    if (num.includes("/")) {
      const [a, b] = num.split("/").map(s => parseFloat(s.trim()));
      value = a / b;
    } else {
      value = parseFloat(num);
    }
    if (isNaN(value)) return match;
    const scaled = value * mult;
    return pre + formatScaled(scaled) + post;
  });
}

function hasScalableNumber(ing) {
  return /^\s*\d/.test(ing) || /^\s*\w+\s+\d/.test(ing);
}

function renderBatchCalc(r) {
  const bd = BATCH_DATA[r.id];
  if (!bd) return "";
  const defaultL = (bd.makes_ml / 1000);
  const litres = state.batchLitres !== null ? state.batchLitres : defaultL;
  const mult = litres / (bd.makes_ml / 1000);
  const quickOpts = [defaultL];
  if (defaultL <= 2) quickOpts.push(defaultL*2, defaultL*3, defaultL*5);
  else if (defaultL <= 5) quickOpts.push(defaultL*2, 10, 20);
  else quickOpts.push(defaultL*2, 15, 20);

  let rows = bd.ingredients.map(ing => {
    let scaled;
    if (ing.perBatch !== undefined) {
      scaled = Math.ceil(ing.perBatch * mult);
    } else {
      scaled = Math.round(ing.ml * mult);
    }
    const unit = ing.unit || "ml";
    let amountStr;
    if (unit === "ml" && scaled >= 1000) {
      amountStr = (scaled / 1000).toFixed(scaled % 1000 === 0 ? 0 : 1) + " L";
    } else {
      amountStr = scaled + " " + unit;
    }
    let bottleStr = "";
    if (ing.bottle && BOTTLE_SIZES[ing.bottle] && unit !== "pkt" && unit !== "bag" && unit !== "pcs") {
      const bSize = BOTTLE_SIZES[ing.bottle];
      const bottles = scaled / bSize;
      if (bottles <= 0.25) bottleStr = "¼ bottle";
      else if (bottles <= 0.34) bottleStr = "⅓ bottle";
      else if (bottles <= 0.55) bottleStr = "½ bottle";
      else if (bottles <= 0.76) bottleStr = "¾ bottle";
      else if (bottles <= 1.05) bottleStr = "1 bottle";
      else bottleStr = bottles.toFixed(1).replace(/\.0$/,"") + " bottles";
    }
    return `<div class="batch-ing">
      <div class="batch-ing-name">${escapeHtml(ing.name)}</div>
      <div class="batch-ing-amount">${amountStr}</div>
      ${bottleStr ? `<div class="batch-ing-bottles">${bottleStr}</div>` : '<div class="batch-ing-bottles"></div>'}
    </div>`;
  }).join("");

  const totalMl = Math.round(litres * 1000);
  return `<div class="batch-calc">
    <div class="batch-calc-label">BATCH CALCULATOR</div>
    <div class="batch-calc-info">Standard recipe makes ${defaultL}L. Enter how much you need:</div>
    <div class="batch-calc-row">
      <input class="batch-calc-input" id="batch-input" type="number" step="0.1" min="0.1" value="${litres}" oninput="setBatchLitres(this.value)">
      <div class="batch-calc-unit">LITRES</div>
    </div>
    <div class="batch-quick" id="batch-quick">
      ${quickOpts.map(v => `<button class="batch-quick-btn ${litres === v ? 'active' : ''}" onclick="setBatchQuick(${v})">${v}L</button>`).join('')}
    </div>
    <div style="font-size:11px;color:#555;margin-bottom:6px;display:flex;justify-content:space-between"><span>INGREDIENT</span><span>AMOUNT &nbsp; BOTTLES</span></div>
    <div id="batch-results">
    ${rows}
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid #252525;display:flex;justify-content:space-between;font-size:13px"><span style="color:#888">Total volume</span><span style="color:#fff;font-weight:700">${totalMl >= 1000 ? (totalMl/1000).toFixed(1).replace(/\.0$/,"") + "L" : totalMl + "ml"}</span></div>
    </div>
  </div>`;
}

  if (target.view === "detail") {
    const recipe = findRecipeById(target.recipeId);
    if (state.imageViewer && state.selectedRecipe && recipe && state.selectedRecipe.id === recipe.id) {
      state.imageViewer = false;
      render();
      return;
    }
    if (recipe && (!state.selectedRecipe || state.selectedRecipe.id !== recipe.id)) {
      runSceneTransition(recipe.name, recipe.category.toUpperCase(), "forward", () => {
        state.mode = targetMode;
        state.selectedRecipe = recipe;
        state.checklist = null;
        state.imageViewer = false;
        state.scale = 1;
        state.batchLitres = null;
      });
    } else {
      state.mode = targetMode;
      state.selectedRecipe = recipe;
      state.checklist = null;
      state.imageViewer = false;
      render();
    }
    return;
  }

  if (target.view === "checklist") {
    state.mode = targetMode;
    state.selectedRecipe = null;
    state.imageViewer = false;
    state.checklist = target.checklist || "opening";
    loadChecklistState();
    render();
    return;
  }

  const returningFromDetail = !!state.selectedRecipe;
  const changingMenu = state.mode !== targetMode;
  const applyHome = () => {
    state.mode = targetMode;
    state.selectedRecipe = null;
    state.imageViewer = false;
    state.checklist = null;
    state.scale = 1;
    state.batchLitres = null;
    state.search = "";
    state.activeFilter = null;
    state.activeCategory = null;
  };
  if (returningFromDetail) {
    runSceneTransition("RECIPE LIBRARY", "RETURNING TO", "back", applyHome);
  } else if (changingMenu) {
    const labels = {tgi: "TGI MENU", classics: "CLASSICS", discontinued: "ARCHIVE"};
    runSceneTransition(labels[targetMode] || "MENU", "RESTORING LIBRARY", "back", applyHome);
  } else {
    applyHome();
    render();
  }
});

restoreInitialHistory();
loadFavs();
loadChecklistState();
render();
</script>
</body>
</html>
